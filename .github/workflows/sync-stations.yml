name: Sync Stations from Google Sheet

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync stations from Google Sheet
        run: python scripts/sync_stations.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet stations.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stations.yaml
          if [ -f stations.yaml.bak ]; then
            git add stations.yaml.bak
          fi
          git commit -m "Auto-update stations.yaml from Google Sheet"
          git push
